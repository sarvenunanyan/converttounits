<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — ConvertToUnits.net</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080c14; --surface:#0d1320; --card:#111827; --border:#1e2d45; --blue:#3b82f6; --blue-light:#60a5fa; --cyan:#06b6d4; --text:#e2e8f0; --text-muted:#7a8fa8; --text-dim:#3d5068; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Mulish',sans-serif; font-weight:300; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:60px 60px; opacity:0.15; pointer-events:none; z-index:0; }
  header { position:relative; z-index:10; padding:0 40px; height:68px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:rgba(8,12,20,0.9); backdrop-filter:blur(16px); }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--blue),var(--cyan)); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-text { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); }
  .logo-text span { color:var(--blue-light); }
  .content { position:relative; z-index:1; max-width:600px; margin:0 auto; padding:60px 24px 100px; }
  h1 { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; margin-bottom:10px; }
  h1 span { background:linear-gradient(135deg,var(--blue-light),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--text-muted); font-size:0.95rem; margin-bottom:40px; line-height:1.7; }
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:32px; }
  .field { display:flex; flex-direction:column; gap:7px; margin-bottom:20px; }
  label { font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); }
  input, textarea, select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:8px; font-family:'Mulish',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; }
  input:focus, textarea:focus, select:focus { border-color:var(--blue-dim); }
  textarea { resize:vertical; min-height:110px; line-height:1.6; }
  select { cursor:pointer; appearance:none; }
  .submit-btn { width:100%; background:var(--blue); color:#fff; border:none; padding:14px; font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:600; letter-spacing:0.05em; cursor:pointer; border-radius:8px; margin-top:8px; transition:background 0.2s; }
  .submit-btn:hover { background:var(--blue-light); }
  .success { display:none; margin-top:16px; padding:14px 18px; background:rgba(6,182,212,0.1); border-left:2px solid var(--cyan); color:#67e8f9; font-size:0.85rem; border-radius:0 8px 8px 0; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:28px 40px; display:flex; justify-content:space-between; }
  footer p, footer a { font-size:0.75rem; color:var(--text-dim); text-decoration:none; }
  @media(max-width:768px) { header{padding:0 16px} footer{flex-direction:column;gap:10px} }
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">Convert<span>ToUnits</span></span>
  </a>
</header>
<div class="content">
  <h1>Get in <span>Touch</span></h1>
  <p class="subtitle">Found a bug? Have a suggestion for a new converter? We'd love to hear from you.</p>
  <div class="form-card">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="John Smith">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option>Bug report</option>
        <option>Feature request — new converter</option>
        <option>Incorrect conversion result</option>
        <option>General feedback</option>
        <option>Partnership / advertising</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Tell us more..."></textarea>
    </div>
    <button class="submit-btn" onclick="handleSubmit()">Send Message →</button>
    <div class="success" id="successMsg">✓ Message sent! We'll get back to you within 2 business days.</div>
  </div>
</div>
<footer>
  <p>© 2025 ConvertToUnits.net</p>
  <div style="display:flex;gap:20px"><a href="privacy.html">Privacy</a><a href="about.html">About</a></div>
</footer>
<script>
function handleSubmit() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  if (!name || !email || !message) { alert('Please fill in all required fields.'); return; }
  document.getElementById('successMsg').style.display = 'block';
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true; btn.textContent = 'Sent ✓'; btn.style.background = '#06b6d4';
}
</script>
</body>
</html>
